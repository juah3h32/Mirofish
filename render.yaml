services:
  - type: web
    name: mirofish-backend
    runtime: python
    buildCommand: pip install uv && cd backend && uv sync
    startCommand: cd backend && uv run python run.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: "3.11.14"
    plan: free
